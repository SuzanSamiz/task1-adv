<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library Management System</title>
    <link rel="stylesheet" href="./assets/styles.css">
</head>
<body>
    <div class="container">
        <h1> Library Management System</h1>
        <div id="statsBar" class="stats-bar"></div>
        <div class="controls">
            <input type="text" id="searchInput" placeholder="Search by title or author...">
            <select id="categoryFilter">
                <option value="all">All Categories</option>
                <option value="Science">Science</option>
                <option value="Fiction">Fiction</option>
                <option value="History">History</option>
                <option value="Literature">Literature</option>
            </select>
        </div>
        <div class="header-actions">
    <button id="openModalBtn" class="main-add-btn"> Add New Book</button>
</div>
<div id="bookGrid" class="book-grid"></div>
</div>
<div id="bookModal" class="modal">
    <div class="modal-content">
        <span class="close-btn">&times;</span>
        <h2>Add New Book</h2>
        <div class="form-container">
            <input type="text" id="newTitle" placeholder="Book Title">
            <input type="text" id="newAuthor" placeholder="Author">
            <select id="newCategory">
                <option value="all">All Categories</option>
                <option value="Science">Science</option>
                <option value="Fiction">Fiction</option>
                <option value="History">History</option>
                <option value="Literature">Literature</option>
            </select>
            <input type="text" id="newLocation" placeholder="Location Code (Optional)">
            <button id="saveBookBtn">Save to Library</button>
        </div>
    </div>
</div>

    <script src="app.js"></script>
</body>
</html>
